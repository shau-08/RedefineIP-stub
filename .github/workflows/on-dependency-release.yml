name: On Dependency Release

# Fired by a dependency repo's RTL-CD.yml (via notify_repo) right after it
# publishes its own release. Bumps this repo's submodule pointer for that
# dependency to the released commit, commits it, then regenerates RTL against
# the new pointer.

on:
  repository_dispatch:
    types: [dependency-released]

permissions:
  contents: write

# Serialize bump-and-push runs: two dependencies releasing close together
# would otherwise both check out the same branch tip and race to push,
# with the second push failing non-fast-forward. Queue instead of drop,
# since every release needs its own bump commit.
concurrency:
  group: on-dependency-release
  cancel-in-progress: false

jobs:
  bump-submodule:
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CI_SUBMODULE_PAT != '' }}
    outputs:
      new_sha: ${{ steps.bump.outputs.new_sha }}
      bumped: ${{ steps.bump.outputs.bumped }}
      target_branch: ${{ steps.bump.outputs.target_branch }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
    steps:
      # This job runs its own raw git commands directly (not through
      # setup-toolchain), so it needs its own auth -- without this,
      # every git@github.com: clone/fetch in the steps below fails,
      # private repo or not. secrets.* can't be referenced directly in
      # an `if:` -- mapped through env.HAS_TOKEN above instead.
      - name: Configure git to use PAT for SSH-style submodule URLs
        if: env.HAS_TOKEN == 'true'
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${{ secrets.CI_SUBMODULE_PAT }}@github.com/".insteadOf "git@github.com:"

      - uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0
          # Prefer the branch the release actually came from. repository_dispatch
          # itself always runs against the default branch regardless -- but the
          # payload carries the real branch (set by Reusable-RTL-CD.yml's "Notify
          # super-repo" step), so we can still explicitly check out and later
          # push to the right branch rather than the run's own default context.
          # Falls back to this repo's default branch if an older caller's
          # payload doesn't include `branch` yet.
          ref: ${{ github.event.client_payload.branch || '' }}

      - name: Locate submodule path matching the released repo (match by name, not org)
        id: locate
        run: |
          set -euo pipefail
          released_repo="${{ github.event.client_payload.repo }}"   # e.g. "morphingmachines/mmu" -- always the org, never shau-08 (that's only CICD's own home)
          released_name="${released_repo##*/}"                      # -> "mmu"

          match=""
          while IFS= read -r line; do
            path=$(echo "$line" | sed -n 's/^submodule\.\(.*\)\.path .*/\1/p')
            url=$(git config -f .gitmodules --get "submodule.$path.url" || true)
            url_name=$(basename "$url" .git)
            if [ "$url_name" = "$released_name" ]; then
              match="$path"
              break
            fi
          done < <(git config -f .gitmodules --get-regexp '\.path$')

          if [ -z "$match" ]; then
            echo "::error::No submodule in .gitmodules matches released repo '$released_repo' (looked for name '$released_name')"
            exit 1
          fi
          echo "path=$match" >> "$GITHUB_OUTPUT"
          echo "Matched submodule path: $match"

      - name: Bump submodule to the released commit
        id: bump
        env:
          SUB_PATH: ${{ steps.locate.outputs.path }}
          RELEASED_SHA: ${{ github.event.client_payload.sha }}
          RELEASED_TAG: ${{ github.event.client_payload.tag }}
          RELEASED_REPO: ${{ github.event.client_payload.repo }}
          PAYLOAD_BRANCH: ${{ github.event.client_payload.branch }}
        run: |
          set -euo pipefail

          # Resolve which branch to push the bump commit to. Prefer the branch
          # carried in the dispatch payload (the branch that actually released);
          # fall back to this repo's own default branch only for older callers
          # whose payload doesn't include `branch` yet.
          if [ -n "$PAYLOAD_BRANCH" ]; then
            target_branch="$PAYLOAD_BRANCH"
          else
            target_branch=$(git remote show origin | awk '/HEAD branch/ {print $NF}')
          fi
          echo "target_branch=$target_branch" >> "$GITHUB_OUTPUT"

          released_name="${RELEASED_REPO##*/}"
          echo "tag_name=${released_name}-${target_branch}-${RELEASED_TAG}" >> "$GITHUB_OUTPUT"

          git submodule update --init --depth 1 -- "$SUB_PATH"

          before_sha=$(git -C "$SUB_PATH" rev-parse HEAD)
          if [ "$before_sha" = "$RELEASED_SHA" ]; then
            echo "Submodule $SUB_PATH is already at $RELEASED_SHA -- nothing to bump."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_sha=$before_sha" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git -C "$SUB_PATH" fetch --depth 1 origin "$RELEASED_SHA"
          git -C "$SUB_PATH" checkout --detach "$RELEASED_SHA"

          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add "$SUB_PATH"
          git commit -m "chore: bump $RELEASED_REPO to $RELEASED_TAG ($before_sha -> ${RELEASED_SHA:0:7})"

          git push origin "HEAD:$target_branch"

          new_sha=$(git rev-parse HEAD)
          echo "new_sha=$new_sha" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

  regenerate-rtl:
    needs: bump-submodule
    if: needs.bump-submodule.outputs.bumped == 'true'
    permissions:
      contents: write
    uses: shau-08/CICD/.github/workflows/Reusable-RTL-CD.yml@main
    with:
      build_output_path: generated_sv_dir
      ref: ${{ needs.bump-submodule.outputs.new_sha }}
      tag_name: ${{ needs.bump-submodule.outputs.tag_name }}
    secrets: inherit
